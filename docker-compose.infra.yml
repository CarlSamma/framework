# ============================================================================
# Infrastructure stack per APP_Opzione_Ibrida (HYDRA + CHRONOS)
# Branch: hybrid
# Avvio: docker compose -f docker-compose.infra.yml up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 — primary persistence per CHRONOS
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tap-postgres
    environment:
      POSTGRES_USER: tap
      POSTGRES_PASSWORD: tap
      POSTGRES_DB: chronos
      POSTGRES_MULTIPLE_DATABASES: hydra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tap -d chronos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Neo4j 5.x — V-Genome per HYDRA
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: tap-neo4j
    environment:
      NEO4J_AUTH: neo4j/tapv4hydra
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Apache Kafka + Zookeeper — event bus
  # NOTA: due listener separati:
  #   - PLAINTEXT_INTERNAL://kafka:29092  → usato dai container (Debezium, app)
  #   - PLAINTEXT://localhost:9092        → usato dall'host Windows (kafkacat, ecc.)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: tap-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: tap-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Debezium Connect 2.7.3.Final — CDC PostgreSQL -> Kafka -> Neo4j
  # NOTA: usa kafka:29092 (listener interno Docker)
  # REST API su http://localhost:8083
  # Registra il connettore con: .\scripts\debezium.ps1
  # --------------------------------------------------------------------------
  debezium:
    image: quay.io/debezium/connect:2.7.3.Final
    container_name: tap-debezium
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: tap-debezium-group
      CONFIG_STORAGE_TOPIC: tap.debezium.configs
      OFFSET_STORAGE_TOPIC: tap.debezium.offsets
      STATUS_STORAGE_TOPIC: tap.debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_PLUGIN_PATH: /kafka/connect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # --------------------------------------------------------------------------
  # Redis 7 — circuit breaker state + cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # Temporal Server + UI
  # --------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.25
    container_name: tap-temporal
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: tap
      POSTGRES_PWD: tap
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - temporal_data:/etc/temporal

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: tap-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"

  # --------------------------------------------------------------------------
  # MinIO — object storage per artefatti
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: tap-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tap
      MINIO_ROOT_PASSWORD: tapv4minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # ClickHouse — analytics dashboard
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.11
    container_name: tap-clickhouse
    ports:
      - "8123:8123"
      - "9009:9009"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: tap
      CLICKHOUSE_PASSWORD: tap
      CLICKHOUSE_DB: tap_analytics
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  temporal_data:
  minio_data:
  clickhouse_data:
