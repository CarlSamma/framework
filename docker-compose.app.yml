# ============================================================================
# Application stack per APP_Opzione_Ibrida (HYDRA + CHRONOS + TAP)
# Branch: hybrid
#
# PRE-REQUISITO: docker compose -f docker-compose.infra.yml up -d
# Avvio:         docker compose -f docker-compose.app.yml up -d
# Avvio completo: docker compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # HYDRA API — FastAPI, gestione V-Genome e graph intelligence
  # Porta: http://localhost:8000
  # Docs:  http://localhost:8000/docs
  # --------------------------------------------------------------------------
  hydra-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: hydra
    container_name: tap-hydra-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SERVICE_NAME: hydra-api
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tapv4hydra
      POSTGRES_DSN: postgresql+asyncpg://tap:tap@postgres:5432/hydra
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - neo4j
      - postgres
      - kafka
      - redis
    networks:
      - tap-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # CHRONOS Worker — Temporal worker, orchestrazione workflow
  # Connesso a Temporal Server (tap-temporal)
  # --------------------------------------------------------------------------
  chronos-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: chronos
    container_name: tap-chronos-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: chronos-worker
      TEMPORAL_HOST: temporal:7233
      POSTGRES_DSN: postgresql+asyncpg://tap:tap@postgres:5432/chronos
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - temporal
      - postgres
      - kafka
    networks:
      - tap-net

  # --------------------------------------------------------------------------
  # TAP Engine — core processing engine, consumer Kafka CDC events
  # Legge da Kafka (Debezium CDC) e aggiorna Neo4j
  # --------------------------------------------------------------------------
  tap-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: tap
    container_name: tap-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: tap-engine
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: tap-engine-group
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tapv4hydra
      POSTGRES_DSN: postgresql+asyncpg://tap:tap@postgres:5432/chronos
      REDIS_URL: redis://redis:6379/2
    depends_on:
      - kafka
      - neo4j
      - debezium
    networks:
      - tap-net

  # --------------------------------------------------------------------------
  # Adapters Service — connettori verso sistemi esterni (X/Twitter, ecc.)
  # --------------------------------------------------------------------------
  adapters:
    build:
      context: .
      dockerfile: Dockerfile
      target: adapters
    container_name: tap-adapters
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_NAME: adapters
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/3
      POSTGRES_DSN: postgresql+asyncpg://tap:tap@postgres:5432/chronos
    depends_on:
      - kafka
      - redis
    networks:
      - tap-net

  # --------------------------------------------------------------------------
  # Frontend — interfaccia utente (serve su :3000 in dev)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tap-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - hydra-api
    networks:
      - tap-net

# ------------------------------------------------------------------------------
# Rete condivisa con docker-compose.infra.yml
# NOTA: la rete deve esistere - viene creata da docker-compose.infra.yml
# Se avvii solo questo file, crea la rete manualmente:
#   docker network create tap-infra_default
# ------------------------------------------------------------------------------
networks:
  tap-net:
    external: true
    name: framework160626_default
